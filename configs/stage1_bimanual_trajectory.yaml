mujoco_model_path: assets/g1_upper_body_scene.xml
right_eef_site_name: right_eef_site
left_eef_site_name: left_eef_site
right_marker_name: target_right
left_marker_name: target_left
camera_name: front_camera
camera_width: 640
camera_height: 480

control_mode: kinematic
target_mode: trajectory_bimanual
trajectory_type: circle

right_target_center: [0.35, -0.22, 1.08]
left_target_center: [0.35, 0.22, 1.08]
right_trajectory_radius: 0.08
left_trajectory_radius: 0.08
right_trajectory_amplitude: [0.06, 0.05, 0.03]
left_trajectory_amplitude: [0.06, 0.05, 0.03]
right_axis: xy
left_axis: xy
frequency: 0.12

kp: 45.0
kd: 6.0
posture_gain: 0.15
task_gain: 2.0
max_joint_speed: 0.6

max_steps: 1200
control_dt: 0.01
tracking_threshold: 0.05

save_rgbd: true
save_every_n_frames: 1
output_dir: data/samples/stage1_bimanual_trajectory
